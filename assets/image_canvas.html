<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片剪贴板画布</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --canvas-bg: #ffffff;
            --border-color: #ddd;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
        }

        #instructions {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        #clear-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 77, 79, 0.9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            z-index: 1001;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: background 0.2s, transform 0.1s;
        }

        #clear-btn:hover {
            background: #ff4d4f;
            transform: scale(1.05);
        }

        #clear-btn:active {
            transform: scale(0.95);
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: auto;
            background-image: 
                linear-gradient(45deg, #f5f5f5 25%, transparent 25%), 
                linear-gradient(-45deg, #f5f5f5 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f5f5f5 75%), 
                linear-gradient(-45deg, transparent 75%, #f5f5f5 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .pasted-image-container {
            position: absolute;
            cursor: move;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            transition: box-shadow 0.2s, border-color 0.2s;
            line-height: 0;
        }

        .pasted-image-container:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border-color: #4a90e2;
        }

        .pasted-image-container img {
            width: 100%;
            height: auto;
            pointer-events: none;
            display: block;
        }

        .pasted-image-container .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #4a90e2;
            display: none;
            border-radius: 2px;
            z-index: 10;
        }

        .pasted-image-container .resize-handle.br {
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
        }

        .pasted-image-container .resize-handle.tl {
            left: -5px;
            top: -5px;
            cursor: nwse-resize;
        }

        .pasted-image-container:hover .resize-handle {
            display: block;
        }

        .pasted-image-container .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            background: #ff4d4f;
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            line-height: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .pasted-image-container:hover .delete-btn {
            display: flex;
        }

        .pasted-text-container {
            position: absolute;
            cursor: move;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            background-color: #fff9c4; /* 浅黄色贴纸感 */
            padding: 15px;
            max-width: 400px;
            min-width: 100px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 16px;
            color: #333;
            border-radius: 4px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .pasted-text-container:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border-color: #4a90e2;
        }

        .pasted-text-container .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            background: #ff4d4f;
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            line-height: 1;
        }

        .pasted-text-container:hover .delete-btn {
            display: flex;
        }
    </style>
</head>
<body>

    <div id="instructions">直接按 Ctrl+V (或 Cmd+V) 粘贴图片或文字</div>
    <button id="clear-btn">清空画布</button>
    <div id="canvas"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const instructions = document.getElementById('instructions');
        const clearBtn = document.getElementById('clear-btn');
        let zIndexCounter = 1;

        // 清空画布功能
        clearBtn.onclick = () => {
            if (canvas.children.length > 0) {
                if (confirm('是否清空画布上的所有内容？')) {
                    canvas.innerHTML = '';
                    instructions.style.opacity = '1';
                    zIndexCounter = 1;
                }
            }
        };

        // 处理粘贴事件
        window.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let handled = false;

            for (let i = 0; i < items.length; i++) {
                // 处理图片
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    
                    reader.onload = function(event) {
                        createImageElement(event.target.result);
                    };
                    
                    reader.readAsDataURL(blob);
                    handled = true;
                } 
                // 处理文字 (仅在没有处理图片或明确是纯文本时)
                else if (items[i].type === 'text/plain') {
                    items[i].getAsString(function(text) {
                        // 如果同时有图片和文字，优先处理图片（常见于某些App复制）
                        // 或者如果只有文字，则创建文本框
                        if (text.trim()) {
                            createTextElement(text);
                        }
                    });
                    handled = true;
                }
            }

            if (handled) {
                instructions.style.opacity = '0';
            }
        });

        function createContainer(className) {
            const container = document.createElement('div');
            container.className = className;
            container.style.zIndex = zIndexCounter++;
            
            const x = Math.random() * (window.innerWidth - 300);
            const y = Math.random() * (window.innerHeight - 200);
            container.style.left = x + 'px';
            container.style.top = y + 'px';

            const deleteBtn = document.createElement('div');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                container.remove();
            };

            container.appendChild(deleteBtn);
            makeDraggable(container);
            return container;
        }

        function createImageElement(src) {
            const container = createContainer('pasted-image-container');
            const img = document.createElement('img');
            img.src = src;
            
            img.onload = () => {
                const initialWidth = Math.min(img.naturalWidth, 600);
                container.style.width = initialWidth + 'px';
            };

            const handleBR = document.createElement('div');
            handleBR.className = 'resize-handle br';
            
            const handleTL = document.createElement('div');
            handleTL.className = 'resize-handle tl';
            
            container.appendChild(img);
            container.appendChild(handleBR);
            container.appendChild(handleTL);
            canvas.appendChild(container);

            makeResizable(container, handleBR, 'br');
            makeResizable(container, handleTL, 'tl');
        }

        function createTextElement(text) {
            const container = createContainer('pasted-text-container');
            const content = document.createElement('div');
            content.textContent = text;
            container.appendChild(content);
            canvas.appendChild(container);
        }

        function makeResizable(el, handle, type) {
            let isResizing = false;
            let startX, startY, startWidth, startLeft, startTop;

            handle.addEventListener('mousedown', function(e) {
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                startWidth = el.offsetWidth;
                startLeft = el.offsetLeft;
                startTop = el.offsetTop;
                e.stopPropagation();
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                
                if (type === 'br') {
                    const newWidth = startWidth + (e.clientX - startX);
                    if (newWidth > 50) {
                        el.style.width = newWidth + 'px';
                    }
                } else if (type === 'tl') {
                    const diffX = startX - e.clientX;
                    const newWidth = startWidth + diffX;
                    if (newWidth > 50) {
                        // 因为是等比例，宽度变化量 diffX
                        // 对应的 left 偏移就是 -diffX
                        // 对应的 top 偏移需要根据比例计算，但浏览器 img height:auto 会自动处理显示
                        // 我们只需要同步调整 container 的位置
                        const ratio = el.offsetHeight / el.offsetWidth;
                        const diffY = diffX * ratio;
                        
                        el.style.width = newWidth + 'px';
                        el.style.left = (startLeft - diffX) + 'px';
                        el.style.top = (startTop - diffY) + 'px';
                    }
                }
            });

            document.addEventListener('mouseup', function() {
                isResizing = false;
            });
        }

        function makeDraggable(el) {
            let isDragging = false;
            let offset = { x: 0, y: 0 };

            el.addEventListener('mousedown', function(e) {
                isDragging = true;
                // 点击时置顶
                el.style.zIndex = zIndexCounter++;
                
                const rect = el.getBoundingClientRect();
                offset.x = e.clientX - rect.left;
                offset.y = e.clientY - rect.top;
                
                el.style.transition = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                
                const x = e.clientX - offset.x;
                const y = e.clientY - offset.y;
                
                el.style.left = x + 'px';
                el.style.top = y + 'px';
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    el.style.transition = '';
                }
            });
        }
    </script>
</body>
</html>
